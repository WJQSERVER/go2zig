name: CI

on:
  push:
    paths:
      - "**/*.go"
      - "**/*.zig"
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Prepare basic example
        run: go run ./cmd/go2zig -api ./examples/basic/api.zig -zig ./examples/basic/lib.zig -out ./examples/basic/gen.go -pkg main -lib basic
      - name: Run tests
        run: go test ./...
      - name: Run asm benchmarks
        run: go test -bench . ./asmcall
      - name: Cross-check windows arm64 build
        shell: powershell
        run: $env:GOOS='windows'; $env:GOARCH='arm64'; $env:CGO_ENABLED='0'; go build ./...

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Prepare basic example
        run: go run ./cmd/go2zig -api ./examples/basic/api.zig -zig ./examples/basic/lib.zig -out ./examples/basic/gen.go -pkg main -lib basic
      - name: Run tests
        run: go test ./...
      - name: Cross-check linux amd64 build
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build ./...
      - name: Cross-check linux arm64 build
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build ./...
