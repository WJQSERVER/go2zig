name: CI

on:
  push:
    paths:
      - "**/*.go"
      - "**/*.zig"
      - "**/*.md"
      - ".github/workflows/*.yml"
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            run_tests: true
            run_bench: true
            build_cmd: "$env:GOOS='windows'; $env:GOARCH='amd64'; $env:CGO_ENABLED='0'; go build ./..."
          - os: windows-latest
            goos: windows
            goarch: arm64
            run_tests: false
            run_bench: false
            build_cmd: "$env:GOOS='windows'; $env:GOARCH='arm64'; $env:CGO_ENABLED='0'; go build ./..."
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            run_tests: true
            run_bench: false
            build_cmd: "GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build ./..."
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            run_tests: false
            run_bench: false
            build_cmd: "GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build ./..."
          - os: macos-latest
            goos: darwin
            goarch: amd64
            run_tests: true
            run_bench: false
            build_cmd: "GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build ./..."
          - os: macos-latest
            goos: darwin
            goarch: arm64
            run_tests: false
            run_bench: false
            build_cmd: "GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build ./..."
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Prepare basic example
        run: go run ./cmd/go2zig -api ./examples/basic/api.zig -zig ./examples/basic/lib.zig -out ./examples/basic/gen.go -pkg main -lib basic
      - name: Run tests
        if: ${{ matrix.run_tests }}
        run: go test ./...
      - name: Run asm benchmarks
        if: ${{ matrix.run_bench }}
        run: go test -bench . ./asmcall
      - name: Cross-check build
        run: ${{ matrix.build_cmd }}
