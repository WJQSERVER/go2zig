name: Windows ARM64 Cross-Built Runtime Check

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/failed-ci-warm64.yml"
      - "examples/basic/**"

jobs:
  build-cross-runtime:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-amd64
            os: windows-latest
          - id: linux-amd64
            os: ubuntu-latest
    name: build-${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Cross-compile windows arm64 runtime
        shell: pwsh
        run: |
          $outDir = Join-Path $env:RUNNER_TEMP "basic-winarm64-${{ matrix.id }}"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $outPath = Join-Path $outDir "basic.dll"
          & zig build-lib -dynamic -target aarch64-windows -O ReleaseSafe "-femit-bin=$outPath" examples/basic/go2zig_build_root.zig
          Get-ChildItem $outDir
      - uses: actions/upload-artifact@v4
        with:
          name: basic-winarm64-${{ matrix.id }}
          path: ${{ runner.temp }}/basic-winarm64-${{ matrix.id }}/basic.dll

  test-runtime-on-winarm64:
    needs: build-cross-runtime
    strategy:
      fail-fast: false
      matrix:
        builder:
          - windows-amd64
          - linux-amd64
    name: test-winarm64-${{ matrix.builder }}
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/download-artifact@v4
        with:
          name: basic-winarm64-${{ matrix.builder }}
          path: ${{ runner.temp }}/basic-winarm64-${{ matrix.builder }}
      - name: Verify downloaded runtime
        shell: pwsh
        run: |
          Get-ChildItem -Recurse "${{ runner.temp }}/basic-winarm64-${{ matrix.builder }}"
      - name: Run basic example test against cross-built runtime
        shell: pwsh
        env:
          GO2ZIG_BASIC_RUNTIME_PATH: ${{ runner.temp }}/basic-winarm64-${{ matrix.builder }}/basic.dll
        run: |
          $env:CGO_ENABLED = "0"
          go test ./examples/basic -run '^TestExampleAPI$' -count=1 -v
